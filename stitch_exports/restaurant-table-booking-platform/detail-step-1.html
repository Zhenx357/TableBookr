<header class="bg-white dark:bg-slate-900 border-b border-slate-100 dark:border-slate-800 shadow-sm dark:shadow-none docked full-width top-0 z-50">
<div class="flex items-center justify-between px-8 h-16 w-full max-w-7xl mx-auto">
<div class="flex items-center gap-4">
<span class="text-xl font-bold text-emerald-900 dark:text-emerald-50">ReserveFlow</span>
</div>
<div class="hidden md:flex items-center gap-8">
<a class="text-emerald-900 dark:text-emerald-400 font-semibold border-b-2 border-emerald-900 px-1 py-5 h-16 flex items-center" href="#">Reservations</a>
<a class="text-slate-500 dark:text-slate-400 hover:text-emerald-800 transition-colors px-1 py-5 h-16 flex items-center" href="#">Menu</a>
<a class="text-slate-500 dark:text-slate-400 hover:text-emerald-800 transition-colors px-1 py-5 h-16 flex items-center" href="#">Gallery</a>
</div>
<div class="flex items-center gap-4">
<button class="p-2 hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors rounded-full text-slate-700 dark:text-slate-300">
<span class="material-symbols-outlined" data-icon="account_circle">account_circle</span>
</button>
<button class="p-2 hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors rounded-full text-slate-700 dark:text-slate-300">

</button>
</div>

<p class="font-body-lg text-body-lg text-secondary max-w-xl mx-auto">Experience culinary excellence at ReserveFlow. Select your details below to secure your exquisite dining experience.</p>
</div>

<div class="w-full max-w-2xl bg-surface-container-lowest border border-outline-variant rounded-3xl shadow-sm overflow-hidden">

<div class="flex items-center justify-center p-8 border-b border-surface-variant bg-surface-bright">
<div class="flex items-center gap-4">
<div class="flex items-center gap-2">
<span class="w-8 h-8 rounded-full bg-primary text-on-primary flex items-center justify-center text-label-md font-label-md">1</span>
<span class="font-label-md text-label-md text-primary">Reservation</span>
</div>
<div class="w-12 h-[2px] bg-outline-variant"></div>
<div class="flex items-center gap-2">
<span class="w-8 h-8 rounded-full bg-surface-container-high text-on-surface-variant flex items-center justify-center text-label-md font-label-md border border-outline-variant">2</span>
<span class="font-label-md text-label-md text-secondary">Contact</span>
</div>
</div>
</div>
<!-- Form Content -->
<div class="p-8 space-y-10">
<!-- Guest Selector -->
<section>
<label class="block font-label-md text-label-md text-on-surface-variant mb-4">Number of Guests</label>
<div class="flex items-center overflow-x-auto gap-2 pb-2 scrollbar-hide">

</div>

<span class="text-label-md font-label-md">Specific Date</span>
</button></div>
<div class="flex items-center gap-3">
<div class="flex-grow flex items-center gap-2 pb-1 scrollbar-hide justify-between"><button class="flex flex-col items-center justify-center flex-1 min-w-[72px] py-3 rounded-2xl border border-outline-variant bg-white text-secondary hover:border-primary-container transition-all">
<span class="font-label-sm text-[10px] uppercase opacity-70">Mon</span>
<span class="font-h3 text-h3">13</span>
</button>
<button class="flex flex-col items-center justify-center flex-1 min-w-[72px] py-3 rounded-2xl border-2 border-primary bg-primary-fixed text-primary shadow-sm">

<span class="font-h3 text-h3">14</span>

<span class="font-h3 text-h3">16</span>

<span class="font-label-sm text-[10px] uppercase opacity-70">Fri</span>
<span class="font-h3 text-h3">17</span>
</button>
<button class="flex flex-col items-center justify-center flex-1 min-w-[72px] py-3 rounded-2xl border border-outline-variant bg-white text-secondary hover:border-primary-container transition-all">

<button class="py-3 rounded-2xl border border-outline-variant bg-white text-on-surface font-label-md text-label-md hover:border-primary-container transition-all">19:00</button>
<button class="py-3 rounded-2xl border border-outline-variant bg-white text-on-surface font-label-md text-label-md hover:border-primary-container transition-all">19:30</button>
<button class="py-3 rounded-2xl border border-outline-variant bg-white text-on-surface font-label-md text-label-md hover:border-primary-container transition-all">20:00</button>
<button class="py-3 rounded-2xl border border-outline-variant bg-white text-on-surface font-label-md text-label-md hover:border-primary-container transition-all">20:30</button>
<button class="py-3 rounded-2xl border border-outline-variant bg-white text-on-surface font-label-md text-label-md hover:border-primary-container transition-all">21:00</button>

<p class="text-sm font-normal text-slate-500 dark:text-slate-400">© 2024 Hospitality Systems. Precise Management.</p>
</div>
<div class="flex items-center gap-8">
<a class="text-slate-500 dark:text-slate-400 hover:text-emerald-800 transition-colors text-sm" href="#">Privacy</a>
<a class="text-slate-500 dark:text-slate-400 hover:text-emerald-800 transition-colors text-sm" href="#">Terms</a>
<a class="text-slate-500 dark:text-slate-400 hover:text-emerald-800 transition-colors text-sm" href="#">Support</a>
